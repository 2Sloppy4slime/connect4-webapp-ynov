<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>Puissance 4 — Web GO</title>
    <link rel="stylesheet" href="/css/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
    <header class="site-header">
        <h1>Puissance 4</h1>
        <p class="subtitle">Deux joueurs — Rouge vs Jaune</p>
    </header>

    <main class="game">
        <!-- Panneau latéral : état du jeu -->
        <aside class="panel">
            <div class="status">
                <span class="label">Tour :</span>
                <span class="player-dot player1" aria-hidden="true"></span>
                <span class="player-name" id="player-turn">Joueur Rouge</span>
            </div>

            <!-- Message backend (victoire, égalité, etc.) -->
            <p class="message">{{.Message}}</p>

            <div class="legend">
                <div><span class="dot player1"></span> Rouge</div>
                <div><span class="dot player2"></span> Jaune</div>
            </div>

            <!-- Réinitialisation (tu pourras brancher sur /reset côté Go si besoin) -->
            <form action="/reset" method="POST" class="reset-form">
                <button type="submit" class="btn-secondary">Réinitialiser</button>
            </form>
        </aside>

        <!-- Zone de jeu -->
        <section class="board-area">
            <!-- Rangée d’actions : déposer un pion par colonne -->
            <form class="play-controls" action="/turn" method="POST" target="sink" aria-label="Choisir une colonne">
                <button name="x" value="0" class="drop-btn" aria-label="Jouer en colonne 1">▼ 1</button>
                <button name="x" value="1" class="drop-btn" aria-label="Jouer en colonne 2">▼ 2</button>
                <button name="x" value="2" class="drop-btn" aria-label="Jouer en colonne 3">▼ 3</button>
                <button name="x" value="3" class="drop-btn" aria-label="Jouer en colonne 4">▼ 4</button>
                <button name="x" value="4" class="drop-btn" aria-label="Jouer en colonne 5">▼ 5</button>
                <button name="x" value="5" class="drop-btn" aria-label="Jouer en colonne 6">▼ 6</button>
                <button name="x" value="6" class="drop-btn" aria-label="Jouer en colonne 7">▼ 7</button>
            </form>

            <!-- Plateau 7 x 6 (coordonnées en data-*) -->
            <div class="board" role="grid" aria-label="Plateau 7 colonnes par 6 lignes">
                <!-- Ligne 1 -->
                <div class="cell" data-col="1" data-row="1"></div>
                <div class="cell" data-col="2" data-row="1"></div>
                <div class="cell" data-col="3" data-row="1"></div>
                <div class="cell" data-col="4" data-row="1"></div>
                <div class="cell" data-col="5" data-row="1"></div>
                <div class="cell" data-col="6" data-row="1"></div>
                <div class="cell" data-col="7" data-row="1"></div>
                <!-- Ligne 2 -->
                <div class="cell" data-col="1" data-row="2"></div>
                <div class="cell" data-col="2" data-row="2"></div>
                <div class="cell" data-col="3" data-row="2"></div>
                <div class="cell" data-col="4" data-row="2"></div>
                <div class="cell" data-col="5" data-row="2"></div>
                <div class="cell" data-col="6" data-row="2"></div>
                <div class="cell" data-col="7" data-row="2"></div>
                <!-- Ligne 3 -->
                <div class="cell" data-col="1" data-row="3"></div>
                <div class="cell" data-col="2" data-row="3"></div>
                <div class="cell" data-col="3" data-row="3"></div>
                <div class="cell" data-col="4" data-row="3"></div>
                <div class="cell" data-col="5" data-row="3"></div>
                <div class="cell" data-col="6" data-row="3"></div>
                <div class="cell" data-col="7" data-row="3"></div>
                <!-- Ligne 4 -->
                <div class="cell" data-col="1" data-row="4"></div>
                <div class="cell" data-col="2" data-row="4"></div>
                <div class="cell" data-col="3" data-row="4"></div>
                <div class="cell" data-col="4" data-row="4"></div>
                <div class="cell" data-col="5" data-row="4"></div>
                <div class="cell" data-col="6" data-row="4"></div>
                <div class="cell" data-col="7" data-row="4"></div>
                <!-- Ligne 5 -->
                <div class="cell" data-col="1" data-row="5"></div>
                <div class="cell" data-col="2" data-row="5"></div>
                <div class="cell" data-col="3" data-row="5"></div>
                <div class="cell" data-col="4" data-row="5"></div>
                <div class="cell" data-col="5" data-row="5"></div>
                <div class="cell" data-col="6" data-row="5"></div>
                <div class="cell" data-col="7" data-row="5"></div>
                <!-- Ligne 6 -->
                <div class="cell" data-col="1" data-row="6"></div>
                <div class="cell" data-col="2" data-row="6"></div>
                <div class="cell" data-col="3" data-row="6"></div>
                <div class="cell" data-col="4" data-row="6"></div>
                <div class="cell" data-col="5" data-row="6"></div>
                <div class="cell" data-col="6" data-row="6"></div>
                <div class="cell" data-col="7" data-row="6"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <small>Puissance 4 — Ynov Projet.</small>
    </footer>
</body>

</html>
