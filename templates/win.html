<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Victoire — Puissance 4</title>
  <link rel="stylesheet" href="/css/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
  <header class="site-header">
    <h1>Puissance 4</h1>
    <p class="subtitle">Deux joueurs — Rouge vs Jaune</p>
  </header>

  <main class="game" style="justify-content:center;">
    <section class="panel" style="text-align:center; max-width:400px; margin:auto;">
      <h2 style="margin-top:0;">🎉 Victoire !</h2>
      <p style="font-size:1.1rem; font-weight:600; margin-bottom:20px;">
        Le vainqueur est :
      </p>

      <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:24px;">
        {{if eq .Winner "Rouge"}}
          <span class="dot player1"></span>
        {{else}}
          <span class="dot player2"></span>
        {{end}}
        <span style="font-weight:700; font-size:1.2rem;">{{.Winner}}</span>
      </div>

      <div style="display:flex; flex-direction:column; gap:10px;">
        <a href="/" class="btn-secondary" style="text-decoration:none; display:block; text-align:center;">
          Retour au plateau
        </a>

        <form action="/reset" method="POST">
          <button type="submit" class="btn-secondary" style="width:100%;">
            Nouvelle partie
          </button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>Puissance 4 — Ynov Projet.</small>
  </footer>
</body>

</html>
