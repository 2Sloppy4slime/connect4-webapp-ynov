<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Victoire — Puissance 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/win.css" />
</head>
<body>
  <header class="site-header">
    <h1>Puissance 4</h1>
    <p class="subtitle">Deux joueurs — Rouge vs Jaune</p>
  </header>

  <main class="win-layout" role="dialog" aria-labelledby="win-title" aria-describedby="win-desc">
    <section class="win-card">
      <div class="win-header">
        <span class="win-emoji" aria-hidden="true">🎉</span>
        <h2 id="win-title" class="win-title">Victoire !</h2>
      </div>

      <p id="win-desc" class="win-subtitle">La partie est terminée.</p>

      <div class="win-winner">
        {{if eq .Winner "Rouge"}}
          <span class="dot player1" aria-hidden="true"></span>
        {{else}}
          <span class="dot player2" aria-hidden="true"></span>
        {{end}}
        <span class="win-winner-name">Vainqueur : <strong>{{.Winner}}</strong></span>
      </div>

      <div class="win-actions">
        <a class="btn-ghost" href="/">↩︎ Retour au plateau</a>
        <form action="/reset" method="POST">
          <button type="submit" class="btn-primary">Nouvelle partie</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>Puissance 4 — Ynov Projet.</small>
  </footer>
</body>
</html>
